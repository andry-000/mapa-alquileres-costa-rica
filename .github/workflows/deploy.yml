name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # La demo pública se pobla con datos SINTÉTICOS etiquetados (banner rojo
      # "DATOS SINTÉTICOS"), sólo en el artefacto desplegado — el repo no
      # commitea nada fabricado. El seed se auto-omite si ya hay datos reales.
      - name: Seed demo data (synthetic, labeled)
        run: python etl/99_seed_demo.py
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No package-lock.json se versiona todavía. Tras el primer `npm install`
      # local, commiteá package-lock.json y cambiá a `cache: npm` + `npm ci`
      # para builds reproducibles y más rápidos.
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
